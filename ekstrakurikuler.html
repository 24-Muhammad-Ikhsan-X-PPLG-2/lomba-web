<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ekstrakurikuler SMK Letris Indonesia 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <div id="scroll-container">
      <section id="hero"></section>
      <section id="futsal"></section>
      <section
        class="min-h-screen text-white bg-[url('/assets/img/eskul/sepak-bola/bg.jpg')] bg-cover bg-center px-4"
      >
        <h1
          class="lg:text-6xl md:text-5xl text-4xl font-bold text-center pt-20 font-jost"
        >
          FUTSAL
        </h1>
        <div
          class="mx-auto lg:w-[700px] md:w-[500px] w-full h-[400px] relative mt-8"
        >
          <img
            src="/assets/img/eskul/futsal/futsal.jpg"
            class="w-full h-full z-1 absolute object-cover rounded-xl"
            alt=""
          />
          <div
            class="absolute z-2 bg-gradient-to-t from-black via-black/70 to-transparent w-full h-[30%] bottom-0 rounded-b-xl px-4"
          >
            <h1 class="text-3xl font-semibold">Ekskul Futsal</h1>
            <p class="mt-1 font-medium leading-relaxed">
              Ekstrakurikuler futsal adalah wadah pengembangan minat dan bakat
              siswa di bidang olahraga sepak bola dalam ruangan.
            </p>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/js/pages/ekstrakurikuler.js"></script>
    <script src="/js/lib/scroll.js"></script>
  </body>
</html>
