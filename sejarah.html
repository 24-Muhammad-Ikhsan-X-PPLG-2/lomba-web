<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sejarah SMK Letris Indonesia 2</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./css/app.css" />
    </head>
    <body>
        <div id="navbar"></div>
        <div
            class="h-[50vh] relative flex justify-center items-center bg-[url('/assets/img/history-bg.jpg')] bg-cover"
        >
            <div class="absolute w-full h-full bg-black/50 z-1"></div>
            <div class="relative z-2 flex w-fit flex-col gap-2">
                <h1 class="text-center text-white text-5xl font-jost font-bold">
                    Sejarah Singkat
                </h1>
                <div class="w-full h-1 bg-[#091336]"></div>
            </div>
        </div>
        <div
            class="min-h-screen px-48 pb-10 text-gray-700 relative overflow-hidden"
        >
            <svg
                class="absolute inset-0 w-full h-full pointer-events-none"
                style="min-height: 1000px"
            >
                <line
                    x1="182"
                    y1="80"
                    x2="84%"
                    y2="350"
                    stroke="#ef4444"
                    stroke-width="3"
                />
                <line
                    x1="84%"
                    y1="350"
                    x2="182"
                    y2="620"
                    stroke="#ef4444"
                    stroke-width="3"
                />
            </svg>

            <div
                class="w-64 relative h-64 bg-[url('/assets/img/apis.jpg')] bg-cover rounded-lg mt-10 z-10"
            >
                <div
                    class="absolute top-5 rounded-full left-1/2 -translate-x-1/2 bg-red-500 size-5 border-4 border-white"
                ></div>
            </div>

            <div
                class="w-64 relative ml-auto h-64 bg-[url('/assets/img/apis.jpg')] bg-cover rounded-lg mt-10 z-10"
            >
                <div
                    class="absolute top-5 rounded-full left-1/2 -translate-x-1/2 bg-red-500 size-5 border-4 border-white"
                ></div>
            </div>

            <div
                class="w-64 relative h-64 bg-[url('/assets/img/apis.jpg')] bg-cover rounded-lg mt-5 z-10"
            >
                <div
                    class="absolute top-5 rounded-full left-1/2 -translate-x-1/2 bg-red-500 size-5 border-4 border-white"
                ></div>
            </div>
        </div>
        <div id="footer"></div>
        <script type="module" src="/js/pages/sejarah.js"></script>
    </body>
</html>
