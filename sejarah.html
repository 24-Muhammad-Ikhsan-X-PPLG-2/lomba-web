<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sejarah SMK Letris Indonesia 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <div class="bg-[#201c1b] pb-20 text-white h-fit">
      <h1
        class="pt-22 font-serif text-center font-bold lg:text-5xl md:text-5xl text-4xl"
      >
        Sejarah SMK Letris 2
      </h1>
      <div
        class="lg:flex hidden gap-3 items-center w-full px-14 mt-10 justify-center"
      >
        <div class="flex items-center gap-2">
          <div class="h-0.5 w-20 bg-[#4B2E2B] rounded-l-xl"></div>
          <p
            class="text-[#8C5A3C] data-[active=true]:drop-shadow-[0_0_8px_rgba(251,191,36,0.6)] data-[active=true]:text-white hover:text-white transition duration-200 cursor-pointer font-semibold text-xl tahun"
          >
            2010
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="h-0.5 w-20 bg-[#4B2E2B]"></div>
          <p
            class="text-[#8C5A3C] data-[active=true]:text-white hover:text-white transition duration-200 cursor-pointer text-xl font-semibold tahun data-[active=true]:drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]"
          >
            2014
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="h-0.5 w-20 bg-[#4B2E2B]"></div>
          <p
            class="text-[#8C5A3C] data-[active=true]:text-white hover:text-white transition duration-200 cursor-pointer text-xl font-semibold tahun data-[active=true]:drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]"
          >
            2016
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="h-0.5 w-20 bg-[#4B2E2B]"></div>
          <p
            class="text-[#8C5A3C] data-[active=true]:text-white hover:text-white transition duration-200 cursor-pointer text-xl font-semibold tahun data-[active=true]:drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]"
          >
            2018
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="h-0.5 w-20 bg-[#4B2E2B]"></div>
          <p
            class="text-[#8C5A3C] data-[active=true]:text-white hover:text-white transition duration-200 cursor-pointer text-xl font-semibold tahun data-[active=true]:drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]"
          >
            2022
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="h-0.5 w-20 bg-[#4B2E2B]"></div>
          <p
            class="text-[#8C5A3C] data-[active=true]:text-white hover:text-white transition duration-200 cursor-pointer text-xl font-semibold tahun data-[active=true]:drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]"
          >
            2024
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="h-0.5 w-20 bg-[#4B2E2B]"></div>
          <p
            class="text-[#8C5A3C] data-[active=true]:text-white hover:text-white transition duration-200 cursor-pointer text-xl font-semibold tahun data-[active=true]:drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]"
          >
            2026
          </p>
          <div class="h-0.5 w-20 bg-[#4B2E2B] rounded-t-xl"></div>
        </div>
      </div>
      <div class="flex lg:hidden items-center gap-2 w-fit mx-auto mt-5">
        <div class="h-0.5 w-20 bg-[#4B2E2B] rounded-l-xl"></div>
        <p
          class="text-white cursor-pointer font-semibold text-xl drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]"
          id="tahun-mobile"
        >
          2010
        </p>
        <div class="h-0.5 w-20 bg-[#4B2E2B] rounded-t-xl"></div>
      </div>
      <div class="w-full relative">
        <div
          class="absolute md:block hidden z-10 top-1/2 -translate-y-1/2 left-0"
          id="prev"
        >
          <div
            class="size-[50px] bg-gray-600/50 flex cursor-pointer justify-center items-center"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-left-icon lucide-arrow-left"
            >
              <path d="m12 19-7-7 7-7" />
              <path d="M19 12H5" />
            </svg>
          </div>
        </div>
        <div
          class="absolute md:block hidden z-10 top-1/2 -translate-y-1/2 right-0"
          id="next"
        >
          <div
            class="size-[50px] bg-gray-600/50 flex cursor-pointer justify-center items-center"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-right-icon lucide-arrow-right"
            >
              <path d="M5 12h14" />
              <path d="m12 5 7 7-7 7" />
            </svg>
          </div>
        </div>

        <div
          id="content"
          class="w-full min-h-[492px] transition-all duration-500"
        ></div>
      </div>
    </div>
    <div id="footer"></div>
    <script type="module" src="/js/pages/sejarah.js"></script>
  </body>
</html>
